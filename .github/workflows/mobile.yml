name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mobile/**'

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
      
      - name: Flutter doctor
        run: flutter doctor -v
      
      - name: Get dependencies
        run: |
          cd mobile/wordpecker_mobile
          flutter pub get
      
      - name: Run analyzer
        run: |
          cd mobile/wordpecker_mobile
          flutter analyze
      
      - name: Run tests
        run: |
          cd mobile/wordpecker_mobile
          flutter test
      
      - name: Check formatting
        run: |
          cd mobile/wordpecker_mobile
          dart format --set-exit-if-changed .
  
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Get dependencies
        run: |
          cd mobile/wordpecker_mobile
          flutter pub get
      
      - name: Build APK
        run: |
          cd mobile/wordpecker_mobile
          flutter build apk --release
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/wordpecker_mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
